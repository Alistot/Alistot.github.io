<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>个人主页</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
}

.container{
    max-width:800px;
    margin:60px auto;
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
    margin-bottom:10px;
}

.subtitle{
    color:gray;
}

.section{
    margin-top:30px;
}

ul{
    padding-left:20px;
}
</style>

</head>

<body>

<div class="container">

<h1>你的名字</h1>
<p class="subtitle">学生 / 开发者 / 设计师</p>

<div class="section">
<h2>关于我</h2>
<p>
这里写一段简单介绍，例如：
我是一名正在学习编程的学生，主要学习 Web 开发、Python 和人工智能。
</p>
</div>

<div class="section">
<h2>技能</h2>
<ul>
<li>HTML / CSS</li>
<li>JavaScript</li>
<li>Python</li>
<li>Git</li>
</ul>
</div>

<div class="section">
<h2>项目</h2>
<ul>
<li>个人博客</li>
<li>简单网页应用</li>
<li>数据分析项目</li>
</ul>
</div>

<div class="section">
<h2>联系方式</h2>
<p>Email: your@email.com</p>
<p>GitHub: https://github.com/你的用户名</p>
</div>

</div>

</body>
</html>
